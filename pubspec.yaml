name: trueastrotalk
description: "A true astro talk app."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.2
  http: ^1.3.0
  google_sign_in: ^6.2.2
  lottie: ^3.3.1
  flutter_launcher_icons: ^0.14.3
  app_links: ^6.4.0
  razorpay_flutter: ^1.4.0
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  firebase_messaging: ^15.2.4
  firebase_core: ^3.12.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^19.0.0
  device_info_plus: ^11.3.0
  country_code_picker: ^3.2.0
  flutter_webrtc: ^0.13.0
  audioplayers: ^6.4.0
  permission_handler: ^11.4.0
  provider: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lotties/ 

